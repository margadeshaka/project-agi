#
# care-demo — vendor-neutral customer-care reference pack.
#
# Bundles three demo scenarios (deflect / resolve / escalate) covering the
# customer-care capability ladder for any subscription or service business
# (SaaS, utility, membership, retail, finance, …). Used by docs, the e2e
# suite, and the kind cluster smoke test.

slug: care-demo
version: 0.1.0
name: Customer care demo pack

# Declared model role bindings — operator.yaml must map each of these to a
# concrete model id. Mismatches surface at pack-load time.
models:
  - reasoning
  - fast
  - embedding

metadata:
  vertical: customer-care
  display_name: Acme Care (demo)
  description: >-
    Reference customer-care pack used by the project-agi getting-started
    flow. Industry-neutral: any business that bills customers, activates
    accounts, processes plan changes, refunds, and escalates to a
    specialist team can adopt this pack as a starting point.
  theme:
    primary: "#0066CC"
    secondary: "#003366"
    accent: "#FF6600"
    mode: light
  role_bindings:
    system_prompt: prompts/system.j2
    scenarios:
      deflect: prompts/deflect.j2
      resolve: prompts/resolve.j2
      escalate: prompts/escalate.j2
  kb:
    article_count: 5
    locale: en
  scenarios:
    - scenarios/deflect.scenario.json
    - scenarios/resolve.scenario.json
    - scenarios/escalate.scenario.json
  contact:
    support_hours: "08:00-22:00 local time, 7 days a week"
    handoff_queue: tier-2-care
