{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agi.fullname" . }}
  labels:
    {{- include "agi.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "ui" -}}
                  {{ include "agi.ui.fullname" $ }}
                {{- else -}}
                  {{ include "agi.runtime.fullname" $ }}
                {{- end }}
                port:
                  number: {{ if eq .service "ui" -}}
                    {{ $.Values.ui.service.port }}
                  {{- else -}}
                    {{ $.Values.runtime.service.port }}
                  {{- end }}
          {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
