{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agi.fullname" . }}-pack-reader
  labels:
    {{- include "agi.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agi.fullname" . }}-pack-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "agi.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
