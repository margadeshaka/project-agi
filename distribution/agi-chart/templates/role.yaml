{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agi.fullname" . }}-pack-reader
  labels:
    {{- include "agi.labels" . | nindent 4 }}
rules:
  # Minimal: the runtime only reads the pack ConfigMap (when packs are
  # mounted via ConfigMap). No write, no delete, no other resource.
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - {{ include "agi.packs.configmapName" . }}
    verbs: ["get", "list", "watch"]
{{- end }}
