{{- if .Values.runtime.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agi.runtime.fullname" . }}
  labels:
    {{- include "agi.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  type: {{ .Values.runtime.service.type }}
  ports:
    - name: http
      port: {{ .Values.runtime.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agi.runtime.selectorLabels" . | nindent 4 }}
{{- end }}
{{- if .Values.ui.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agi.ui.fullname" . }}
  labels:
    {{- include "agi.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agi.ui.selectorLabels" . | nindent 4 }}
{{- end }}
