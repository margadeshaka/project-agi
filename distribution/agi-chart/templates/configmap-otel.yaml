{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if and .Values.runtime.enabled .Values.observability.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agi.fullname" . }}-otel
  labels:
    {{- include "agi.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    # SPDX-License-Identifier: Apache-2.0
    # OpenTelemetry Collector sidecar config — receives OTLP from the
    # runtime on localhost and exports to Langfuse OTLP (and optionally
    # an additional OTLP backend you configure).
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
    exporters:
      {{- if .Values.observability.langfuse.host }}
      otlphttp/langfuse:
        endpoint: "{{ .Values.observability.langfuse.host }}/api/public/otel"
        tls:
          insecure: false
      {{- end }}
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters:
            {{- if .Values.observability.langfuse.host }}
            - otlphttp/langfuse
            {{- end }}
            - debug
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
{{- end }}
