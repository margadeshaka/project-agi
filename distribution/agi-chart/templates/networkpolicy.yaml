{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi.fullname" . }}-default-deny
  labels:
    {{- include "agi.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    {{- if .Values.networkPolicy.egress.dns }}
    # DNS — kube-dns / CoreDNS in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    # Intra-namespace egress (runtime <-> ui, runtime -> tests).
    - to:
        - podSelector: {}
    {{- with .Values.networkPolicy.egress.cidrs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
    {{- end }}
  ingress:
    # Allow ingress controller and intra-namespace.
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
---
{{- if .Values.runtime.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi.runtime.fullname" . }}-allow-http
  labels:
    {{- include "agi.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  podSelector:
    matchLabels:
      {{- include "agi.runtime.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.runtime.service.port }}
{{- end }}
{{- end }}
