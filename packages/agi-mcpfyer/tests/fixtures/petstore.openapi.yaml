openapi: 3.0.3
info:
  title: Petstore
  version: "1.0.0"
  description: Tiny non-TMF OpenAPI fixture for agi-mcpfyer tests.
paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe.
      responses:
        "200":
          description: ok
  /pets:
    get:
      operationId: listPets
      summary: List all pets.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: tag
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: An array of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      summary: Create a pet.
      x-dry-run: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Get a single pet.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      summary: Delete a pet (idempotent — flagged non-side-effecting via extension).
      x-side-effecting: false
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted.
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        tag:
          type: string
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type: string
