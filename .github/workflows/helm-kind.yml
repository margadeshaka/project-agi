#
# helm-kind — installs kind, builds the runtime image, loads it into the
# cluster, helm-installs the chart, and runs `helm test`. Bounded to
# ~6 minutes wall-clock; fails fast if anything regresses.

name: helm-kind

on:
  push:
    branches: [main]
    paths:
      - "distribution/agi-chart/**"
      - "distribution/agi-runtime/**"
      - "packages/agi-sdk/**"
      - "packages/agi-core/**"
      - ".github/workflows/helm-kind.yml"
  pull_request:
    branches: [main]
    paths:
      - "distribution/agi-chart/**"
      - "distribution/agi-runtime/**"
      - "packages/agi-sdk/**"
      - "packages/agi-core/**"
      - ".github/workflows/helm-kind.yml"

jobs:
  install:
    name: helm install on kind
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          cluster_name: agi-kind
          wait: 60s

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Build runtime image
        run: |
          docker build \
            -f distribution/agi-runtime/Dockerfile \
            -t agi-runtime:ci \
            .

      - name: Load runtime image into kind
        run: kind load docker-image agi-runtime:ci --name agi-kind

      - name: Helm lint
        run: helm lint distribution/agi-chart

      - name: Helm install
        run: |
          helm install agi distribution/agi-chart \
            --namespace agi-ci --create-namespace \
            --set runtime.image.repository=agi-runtime \
            --set runtime.image.tag=ci \
            --set runtime.image.pullPolicy=Never \
            --set runtime.replicaCount=1 \
            --set runtime.autoscaling.enabled=false \
            --set runtime.pdb.enabled=false \
            --set ui.enabled=false \
            --set auth.mode=dev-noop \
            --set llm.provider=fake \
            --set observability.otelCollector.enabled=false \
            --set networkPolicy.enabled=false \
            --set runtime.env.AGI_ENV=development \
            --wait --timeout=3m

      - name: Helm test
        run: helm test agi --namespace agi-ci --logs

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n agi-ci get all
          kubectl -n agi-ci describe pods
          kubectl -n agi-ci logs -l app.kubernetes.io/component=runtime --tail=200 || true

      - name: Tear down
        if: always()
        run: helm uninstall agi --namespace agi-ci --ignore-not-found
