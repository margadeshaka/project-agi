# SPDX-License-Identifier: Apache-2.0
#
# publish-pypi — build sdist + wheel for the three Band-1 publishable packages
# (agi-sdk, agi-core, agi-mcpfyer) and upload to PyPI via OIDC trusted publishing.
# No PYPI_API_TOKEN secret is required.
#
# Trusted publisher setup (one-time, per package):
#   https://pypi.org/manage/account/publishing/
#   Owner:                margadeshaka
#   Repository name:      project-agi
#   Workflow filename:    publish-pypi.yml
#   Environment name:     (leave blank)
#
# Triggers:
#   * Push a tag matching v*  → publishes all three packages to PyPI.
#   * workflow_dispatch       → publish one package to TestPyPI (default) or PyPI.

name: publish-pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - agi-sdk
          - agi-core
          - agi-mcpfyer
      repository:
        description: "Target index (TestPyPI is the safe default)"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: [agi-sdk, agi-core, agi-mcpfyer]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling

      - name: Skip when dispatch picked a single package
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pkg="${{ github.event.inputs.package }}"
            if [ "$pkg" != "all" ] && [ "$pkg" != "${{ matrix.package }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping ${{ matrix.package }} — dispatch picked $pkg"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build sdist + wheel
        if: steps.gate.outputs.skip != 'true'
        working-directory: packages/${{ matrix.package }}
        run: |
          python -m build --sdist --wheel --outdir dist
          ls -lh dist/

      - name: Upload built artefacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-dist
          path: packages/${{ matrix.package }}/dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish to TestPyPI
        if: steps.gate.outputs.skip != 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.package }}/dist
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

      - name: Publish to PyPI
        if: steps.gate.outputs.skip != 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi'))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.package }}/dist
          skip-existing: true
          print-hash: true
