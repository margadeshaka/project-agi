#
# Local dev stack for project-agi (Band 2 — Reference Distribution).
#
#   docker compose up -d
#   curl http://localhost:9000/healthz   # runtime liveness
#   open  http://localhost:8080          # admin console
#
# This compose file is the P3 phase-gate target: `docker compose up` brings
# the stack live with /healthz green. Full functionality lands in P3 proper.

name: project-agi

x-runtime-env: &runtime-env
  AGI_ENV: ${AGI_ENV:-dev}
  AGI_PORT: "9000"
  AGI_AUTH: ${AGI_AUTH:-dev-noop}
  AGI_LLM_PROVIDER: ${AGI_LLM_PROVIDER:-fake}
  AGI_MONGO_URI: mongodb://mongodb:27017/agi
  AGI_QDRANT_URL: http://qdrant:6333
  LANGFUSE_HOST: http://langfuse:3000
  AGI_OIDC_ISSUER: ${AGI_OIDC_ISSUER:-}
  AGI_OIDC_AUDIENCE: ${AGI_OIDC_AUDIENCE:-agi-runtime}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

services:
  # ------------------------------------------------------------------
  # agi-runtime — FastAPI + claims-validated X-Pack dispatch
  # ------------------------------------------------------------------
  agi-runtime:
    build:
      context: ../..
      dockerfile: distribution/agi-runtime/Dockerfile
    image: ghcr.io/comviva-oss/agi-runtime:dev
    container_name: agi-runtime
    environment:
      <<: *runtime-env
    ports:
      - "9000:9000"
    volumes:
      - ../../packages/agi-packs:/packs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9000/healthz').raise_for_status()"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ------------------------------------------------------------------
  # agi-ui — Next.js admin console
  # ------------------------------------------------------------------
  agi-ui:
    build:
      context: ../../distribution/agi-ui
      dockerfile: Dockerfile
    image: ghcr.io/comviva-oss/agi-ui:dev
    container_name: agi-ui
    environment:
      AGI_RUNTIME_URL: http://agi-runtime:9000
      NEXT_PUBLIC_OIDC_ISSUER: ${AGI_OIDC_ISSUER:-http://localhost:8081/realms/agi}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      agi-runtime:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Langfuse v3 — trace UI (OTLP ingestion)
  # ------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-secret-change-me}
      SALT: ${LANGFUSE_SALT:-dev-salt-change-me}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    restart: unless-stopped

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Qdrant — vector store
  # ------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ------------------------------------------------------------------
  # MongoDB — runtime storage (executed actions, ai_trail, packs metadata)
  # ------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ------------------------------------------------------------------
  # OTel collector — pipes spans → Langfuse + (later) AI-Trail audit sink
  # ------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

volumes:
  qdrant-data:
  mongo-data:
  langfuse-pg-data:
